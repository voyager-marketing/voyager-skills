name: Validate skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.mjs'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.mjs'
      - 'package.json'
  workflow_dispatch:  # also manual

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate every SKILL.md
        run: node scripts/validate-skills.mjs
